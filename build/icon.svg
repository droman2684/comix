    <rect x="60" y="-24" width="150" height="16" rx="8" fill="#B8C8E8"/>
    <rect x="60" y="22" width="210" height="16" rx="8" fill="#B8C8E8"/>
    <rect x="60" y="68" width="130" height="16" rx="8" fill="#B8C8E8"/>
    <rect x="60" y="114" width="195" height="16" rx="8" fill="#B8C8E8"/>
