appId: com.comics.app
productName: Comics
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
mac:
  icon: build/icon.icns
  category: public.app-category.entertainment
  target:
    - target: dir
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
